<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fitness Tracker Register</title>
  <style>
    :root {
      --bg: #eef3ed;
      --panel: #fcfffb;
      --ink: #152019;
      --muted: #566358;
      --accent: #2f7d57;
      --border: #cad8ce;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top right, rgba(47, 125, 87, 0.16), transparent 34%),
        linear-gradient(145deg, #f7fbf6, var(--bg));
      color: var(--ink);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    }

    .card {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(21, 32, 25, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px 13px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      background: var(--accent);
      color: #fff;
      font: inherit;
      cursor: pointer;
    }

    pre {
      margin: 16px 0 0;
      padding: 12px;
      overflow: auto;
      border: 1px solid var(--border);
      background: #f5faf4;
      color: var(--ink);
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .links {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
    }

    a {
      color: var(--accent);
    }

    @media (max-width: 540px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Register</h1>
    <p>Create an account and the page will store the returned bearer token in local storage.</p>
    <form id="register-form">
      <div class="grid">
        <label>
          Name
          <input type="text" name="name" value="Test User" required>
        </label>
        <label>
          Email
          <input type="email" name="email" value="" placeholder="you@example.com" required>
        </label>
      </div>
      <label>
        Password
        <input type="password" name="password" value="password123" minlength="8" required>
      </label>
      <button type="submit">Create account</button>
    </form>
    <pre id="result">Submit the form to call POST /v1/auth/register.</pre>
    <div class="links">
      <a href="/login">Already have an account?</a>
      <a href="/docs">API docs</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("register-form");
    const result = document.getElementById("result");

    form.email.value = `tester_${Date.now()}@example.com`;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        name: form.name.value,
        email: form.email.value,
        password: form.password.value,
      };

      const response = await fetch("/v1/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const body = await response.json().catch(() => ({}));
      if (body.token) {
        localStorage.setItem("fitness_tracker_token", body.token);
      }

      result.textContent = JSON.stringify({
        status: response.status,
        body,
        saved_token: body.token || null,
      }, null, 2);
    });
  </script>
</body>
</html>
