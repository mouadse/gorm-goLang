          type: string
        equipment:
          type: string
        difficulty:
          type: string
        instructions:
          type: string
        video_url:
          type: string
    UpdateExerciseRequest:
      type: object
      properties:
        name:
          type: string
        muscle_group:
          type: string
        equipment:
          type: string
        difficulty:
          type: string
        instructions:
          type: string
        video_url:
          type: string
    CreateWeightEntryRequest:
      type: object
      required: [user_id, weight]
      properties:
        user_id:
          type: string
          format: uuid
        weight:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
        date:
          type: string
          format: date
