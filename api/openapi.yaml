openapi: 3.0.3
info:
  title: Fitness Tracker API
  version: 1.0.0
  description: |
    Lean Go backend for the core fitness tracking loop: users, exercise library,
    workouts, workout exercises, workout sets, meals, and weight entries.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Exercises
  - name: Workouts
  - name: Workout Exercises
  - name: Workout Sets
  - name: Meals
  - name: Weight Entries
  - name: Notifications
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with password and optional 2FA code
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "202":
          description: Password accepted and 2FA is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorChallengeResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Start 2FA setup for the authenticated user
      operationId: setupTwoFactor
      responses:
        "201":
          description: Secret and otpauth URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetupResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify 2FA setup with a TOTP code
      operationId: verifyTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeRequest"
      responses:
        "200":
          description: 2FA enabled and recovery codes generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorVerifyResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable 2FA for the authenticated user
      operationId: disableTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/recover:
    post:
      tags: [Auth]
      summary: Login with a recovery code
      operationId: recoverTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorRecoveryLoginRequest"
      responses:
        "200":
          description: Login succeeded with recovery code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - in: query
          name: email
          schema:
            type: string
          description: Exact email filter.
        - in: query
          name: name
          schema:
            type: string
          description: Case-sensitive partial name filter.
      responses:
        "200":
          description: Users in descending creation order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
  /v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/records:
    get:
      tags: [Analytics]
      summary: Get user personal records
      operationId: getUserRecords
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: List of personal records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonalRecord"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/workout-stats:
    get:
      tags: [Analytics]
      summary: Get user workout stats
      operationId: getUserWorkoutStats
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: Workout statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutStats"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/activity-calendar:
    get:
      tags: [Adherence]
      summary: Get user activity calendar
      operationId: getActivityCalendar
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: start
          schema:
            type: string
            format: date
        - in: query
          name: end
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Map of dates to activity types.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/streaks:
    get:
      tags: [Adherence]
      summary: Get user streaks and adherence summary
      operationId: getUserStreaks
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Reference date for streak calculation (defaults to today).
      responses:
        "200":
          description: Streaks and adherence summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreaksResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/exercises:
    get:
      tags: [Exercises]
      summary: List exercises
      operationId: listExercises
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: muscle_group
          schema:
            type: string
        - in: query
          name: equipment
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: string
      responses:
        "200":
          description: Exercises in ascending name order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Exercises]
      summary: Create exercise
      operationId: createExercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseRequest"
      responses:
        "201":
          description: Created exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
  /v1/exercises/{id}:
    get:
      tags: [Exercises]
      summary: Get exercise
      operationId: getExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Exercise detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Exercises]
      summary: Update exercise
      operationId: updateExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExerciseRequest"
      responses:
        "200":
          description: Updated exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Exercises]
      summary: Delete exercise
      operationId: deleteExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /v1/exercises/{id}/history:
    get:
      tags: [Exercises]
      summary: Get exercise history
      operationId: getExerciseHistory
      parameters:
        - $ref: "#/components/parameters/ID"
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Ordered past sessions for the exercise.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseHistoryEntry"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/weight-entries:
    get:
      tags: [Weight Entries]
      summary: List weight entries
      operationId: listWeightEntries
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weight entries in descending date order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightEntry"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Weight Entries]
      summary: Create weight entry
      operationId: createWeightEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightEntryRequest"
      responses:
        "201":
          description: Created weight entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/users/{user_id}/weight-entries:
    get:
      tags: [Weight Entries]
      summary: List weight entries for a user
      operationId: listUserWeightEntries
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weight entries for the requested user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightEntry"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Weight Entries]
      summary: Create weight entry for a user
      operationId: createUserWeightEntry
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightEntryRequest"
      responses:
        "201":
          description: Created weight entry for the requested user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/weight-entries/{id}:
    get:
      tags: [Weight Entries]
      summary: Get weight entry
      operationId: getWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Weight entry detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Weight Entries]
      summary: Update weight entry
      operationId: updateWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWeightEntryRequest"
      responses:
        "200":
          description: Updated weight entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Weight Entries]
      summary: Delete weight entry
      operationId: deleteWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/workouts:
    get:
      tags: [Workouts]
      summary: List workouts
      operationId: listWorkouts
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: Workouts in descending date order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workout"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Workouts]
      summary: Create workout
      operationId: createWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutRequest"
      responses:
        "201":
          description: Created workout with nested exercises and sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/users/{user_id}/workouts:
    get:
      tags: [Workouts]
      summary: List workouts for a user
      operationId: listUserWorkouts
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: Workouts for the requested user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workout"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Workouts]
      summary: Create workout for a user
      operationId: createUserWorkout
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutRequest"
      responses:
        "201":
          description: Created workout for the requested user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/workouts/{id}:
    get:
      tags: [Workouts]
      summary: Get workout
      operationId: getWorkout
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Workout detail with nested exercises and sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Workouts]
      summary: Update workout
      operationId: updateWorkout
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkoutRequest"
      responses:
        "200":
          description: Updated workout with nested exercises and sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Workouts]
      summary: Delete workout
      operationId: deleteWorkout
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/workout-exercises:
    get:
      tags: [Workout Exercises]
      summary: List workout exercises
      operationId: listWorkoutExercises
      parameters:
        - in: query
          name: workout_id
          schema:
            type: string
            format: uuid
        - in: query
          name: exercise_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workout exercises with nested exercise and set details.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutExercise"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Workout Exercises]
      summary: Create workout exercise
      operationId: createWorkoutExercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutExerciseRequest"
      responses:
        "201":
          description: Created workout exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutExercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/workouts/{id}/exercises:
    get:
      tags: [Workout Exercises]
      summary: List workout exercises for a workout
      operationId: listWorkoutExercisesForWorkout
      parameters:
        - $ref: "#/components/parameters/ID"
        - in: query
          name: exercise_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workout exercises for the requested workout.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutExercise"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Workout Exercises]
      summary: Add exercise to workout
      operationId: addWorkoutExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutExerciseRequest"
      responses:
        "201":
          description: Created workout exercise for the given workout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutExercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/workout-exercises/{id}:
    get:
      tags: [Workout Exercises]
      summary: Get workout exercise
      operationId: getWorkoutExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Workout exercise detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutExercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Workout Exercises]
      summary: Update workout exercise
      operationId: updateWorkoutExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkoutExerciseRequest"
      responses:
        "200":
          description: Updated workout exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutExercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Workout Exercises]
      summary: Delete workout exercise
      operationId: deleteWorkoutExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/workout-sets:
    get:
      tags: [Workout Sets]
      summary: List workout sets
      operationId: listWorkoutSets
      parameters:
        - in: query
          name: workout_exercise_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workout sets in ascending set number order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutSet"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Workout Sets]
      summary: Create workout set
      operationId: createWorkoutSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutSetRequest"
      responses:
        "201":
          description: Created workout set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"
        "400":
          $ref: "#/components/responses/Error"
        "404":
