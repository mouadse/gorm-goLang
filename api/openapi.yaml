components:
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NoContent:
      description: Resource deleted successfully.
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [title, status, error]
      properties:
        type:
          type: string
          description: Problem type URI. Validation errors use a dedicated type; generic errors use `about:blank`.
          example: about:blank
        title:
          type: string
          description: Short, human-readable summary of the error category.
          example: Bad Request
        status:
          type: integer
          description: HTTP status code for the error response.
          example: 400
        detail:
          type: string
          description: Human-readable explanation of the specific error instance.
          example: invalid email or password
        error:
          type: string
          description: Backward-compatible alias of `detail`.
          example: invalid email or password
        errors:
          type: object
          description: Field-specific validation messages when the request fails validation.
          additionalProperties:
            type: string
          example:
            email: email is required
            password: password must be at least 8 characters
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totp_code:
          type: string
        recovery_code:
          type: string
    TwoFactorCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    TwoFactorRecoveryLoginRequest:
      type: object
      required: [email, password, recovery_code]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        recovery_code:
          type: string
    AuthSessionResponse:
      type: object
      properties:
        token:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        two_factor_required:
          type: boolean
        two_factor_token:
          type: string
    TwoFactorChallengeResponse:
      type: object
      required: [two_factor_required, user]
      properties:
        two_factor_required:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
    TwoFactorSetupResponse:
      type: object
      required: [secret, otp_url, verified]
      properties:
        secret:
          type: string
        otp_url:
          type: string
        verified:
          type: boolean
    TwoFactorVerifyResponse:
      type: object
      required: [recovery_codes, verified]
      properties:
        recovery_codes:
          type: array
          items:
            type: string
        verified:
          type: boolean
    RegisterRequest:
