openapi: 3.0.3
info:
  title: Fitness Tracker API
  version: 1.0.0
  description: |
    Lean Go backend for the core fitness tracking loop: users, exercise library,
    workouts, workout exercises, workout sets, meals, and weight entries.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Analytics
  - name: Adherence
  - name: Chat
  - name: AI Coach
  - name: Exercises
  - name: Workouts
  - name: Workout Exercises
  - name: Workout Sets
  - name: Workout Cardio
  - name: Workout Templates
  - name: Workout Programs
  - name: Meals
  - name: Foods
  - name: Recipes
  - name: Weight Entries
  - name: Summaries
  - name: Exports
  - name: Notifications
  - name: Admin Dashboard
  - name: Admin Moderation
  - name: Admin System
  - name: Admin Audit
  - name: Admin Food Import
paths:
  /v1/leaderboard:
    get:
      tags: [Leaderboard]
      summary: Get Leaderboard
      operationId: getLeaderboard
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [weekly, monthly, yearly, alltime]
            default: weekly
        - name: pillar
          in: query
          required: false
          schema:
            type: string
            enum: [all, training, nutrition, consistency]
            default: all
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user and create a session
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created and session established.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with password and optional 2FA code (session-based)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded. Returns access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "202":
          description: Password accepted and 2FA is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an existing session
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout of current or all sessions
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions for the user
      operationId: getSessions
      responses:
        "200":
          description: List of active sessions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSessions"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a specific session
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Start 2FA setup for the authenticated user
      operationId: setupTwoFactor
      responses:
        "201":
          description: Secret and otpauth URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetupResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify 2FA setup with a TOTP code
      operationId: verifyTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeRequest"
      responses:
        "200":
          description: 2FA enabled and recovery codes generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorVerifyResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable 2FA for the authenticated user
      operationId: disableTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/2fa/recover:
    post:
      tags: [Auth]
      summary: Login with a recovery code
      operationId: recoverTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorRecoveryLoginRequest"
      responses:
        "200":
          description: Login succeeded with recovery code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - in: query
          name: email
          schema:
            type: string
          description: Exact email filter.
        - in: query
          name: name
          schema:
            type: string
          description: Case-sensitive partial name filter.
      responses:
        "200":
          description: Users in descending creation order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
  /v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/records:
    get:
      tags: [Analytics]
      summary: Get user personal records
      operationId: getUserRecords
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: List of personal records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPersonalRecords"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/workout-stats:
    get:
      tags: [Analytics]
      summary: Get user workout stats
      operationId: getUserWorkoutStats
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: Workout statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutStats"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/activity-calendar:
    get:
      tags: [Adherence]
      summary: Get user activity calendar
      operationId: getActivityCalendar
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: start
          schema:
            type: string
            format: date
        - in: query
          name: end
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Map of dates to activity types.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/users/{user_id}/streaks:
    get:
      tags: [Adherence]
      summary: Get user streaks and adherence summary
      operationId: getUserStreaks
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Reference date for streak calculation (defaults to today).
      responses:
        "200":
          description: Streaks and adherence summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreaksResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /v1/chat:
    post:
      tags: [Chat]
      summary: Send a message to the AI coach
      operationId: chat
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/chat/history:
    get:
      tags: [Chat]
      summary: Get chat conversation history
      operationId: getChatHistory
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: query
          schema:
            type: string
            format: uuid
          description: Optional. If provided, returns messages for this conversation. Otherwise returns a list of conversations.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for the conversation list when `conversation_id` is omitted.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of conversations to return per page when `conversation_id` is omitted.
      responses:
        "200":
          description: List of conversations or conversation detail with messages.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PaginatedConversations"
                  - $ref: "#/components/schemas/Conversation"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/chat/feedback:
    post:
      tags: [Chat]
      summary: Provide feedback on an AI message
      operationId: chatFeedback
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatFeedbackRequest"
      responses:
        "200":
          description: Feedback received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/users/{user_id}/coach-summary:
    get:
      tags: [AI Coach]
      summary: Get AI-generated coach summary for a user
      operationId: getCoachSummary
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Optional. Date for the summary (defaults to today).
      responses:
        "200":
          description: Coach summary data.
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /v1/exercises:
    get:
      tags: [Exercises]
      summary: List exercises
      operationId: listExercises
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: muscle_group
          schema:
            type: string
        - in: query
          name: equipment
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: string
      responses:
        "200":
          description: Exercises in ascending name order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExercises"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Exercises]
      summary: Create exercise
      operationId: createExercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseRequest"
      responses:
        "201":
          description: Created exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
  /v1/exercises/{id}:
    get:
      tags: [Exercises]
      summary: Get exercise
      operationId: getExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Exercise detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Exercises]
      summary: Update exercise
      operationId: updateExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExerciseRequest"
      responses:
        "200":
          description: Updated exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Exercises]
      summary: Delete exercise
      operationId: deleteExercise
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /v1/exercises/{id}/history:
    get:
      tags: [Exercises]
      summary: Get exercise history
      operationId: getExerciseHistory
      parameters:
        - $ref: "#/components/parameters/ID"
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Ordered past sessions for the exercise.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExerciseHistory"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/exercises/search:
    post:
      tags: [Exercises]
      summary: Search the exercise library
      operationId: searchExercises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchExercisesRequest"
      responses:
        "200":
          description: List of search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseSearchResult"
        "400":
          $ref: "#/components/responses/Error"
        "502":
          description: Bad gateway to exercise library service.
          content:
            application/json:
              schema:
                $ref: "#/components/responses/Error"
  /v1/exercises/program:
    post:
      tags: [Exercises]
      summary: Generate a workout program
      operationId: generateProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateProgramRequest"
      responses:
        "200":
          description: Generated workout program.
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /v1/exercises/library-meta:
    get:
      tags: [Exercises]
      summary: Get metadata from the exercise library
      operationId: getExerciseLibraryMeta
      responses:
        "200":
          description: Library metadata (equipment, levels, muscles, etc.).
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/Error"
  /v1/exercise-images/{path}:
    get:
      tags: [Exercises]
      summary: Proxy an exercise image from the library
      operationId: getExerciseImage
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Path to the image file.
      responses:
        "200":
          description: Image content.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /v1/weight-entries:
    get:
      tags: [Weight Entries]
      summary: List weight entries
      operationId: listWeightEntries
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weight entries in descending date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWeightEntries"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Weight Entries]
      summary: Create weight entry
      operationId: createWeightEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightEntryRequest"
      responses:
        "201":
          description: Created weight entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/users/{user_id}/weight-entries:
    get:
      tags: [Weight Entries]
      summary: List weight entries for a user
      operationId: listUserWeightEntries
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weight entries for the requested user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWeightEntries"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Weight Entries]
      summary: Create weight entry for a user
      operationId: createUserWeightEntry
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightEntryRequest"
      responses:
        "201":
          description: Created weight entry for the requested user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/weight-entries/{id}:
    get:
      tags: [Weight Entries]
      summary: Get weight entry
      operationId: getWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Weight entry detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Weight Entries]
      summary: Update weight entry
      operationId: updateWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWeightEntryRequest"
      responses:
        "200":
          description: Updated weight entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Weight Entries]
      summary: Delete weight entry
      operationId: deleteWeightEntry
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/workouts:
    get:
      tags: [Workouts]
      summary: List workouts
      operationId: listWorkouts
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
