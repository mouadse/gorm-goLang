components:
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NoContent:
      description: Resource deleted successfully.
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totp_code:
          type: string
        recovery_code:
          type: string
    TwoFactorCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    TwoFactorRecoveryLoginRequest:
      type: object
      required: [email, password, recovery_code]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        recovery_code:
          type: string
    AuthSessionResponse:
      type: object
      properties:
        token:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        two_factor_required:
          type: boolean
    TwoFactorChallengeResponse:
      type: object
      required: [two_factor_required, user]
      properties:
        two_factor_required:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
    TwoFactorSetupResponse:
      type: object
      required: [secret, otp_url, verified]
      properties:
        secret:
          type: string
        otp_url:
          type: string
        verified:
          type: boolean
    TwoFactorVerifyResponse:
      type: object
      required: [recovery_codes, verified]
      properties:
        recovery_codes:
          type: array
          items:
            type: string
        verified:
          type: boolean
    PersonalRecord:
      type: object
      required: [type, exercise_id, exercise_name, value, date, workout_id]
      properties:
        type:
          type: string
          enum: [heaviest_set, best_1rm, best_volume, best_reps]
        exercise_id:
          type: string
          format: uuid
        exercise_name:
          type: string
        value:
          type: number
        date:
          type: string
          format: date-time
        workout_id:
          type: string
          format: uuid
        set_id:
          type: string
          format: uuid
          nullable: true
    WorkoutStats:
      type: object
      required: [total_workouts, total_duration, total_volume, total_sets, avg_workout_duration, workout_types]
