components:
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NoContent:
      description: Resource deleted successfully.
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    PersonalRecord:
      type: object
      required: [type, exercise_id, exercise_name, value, date, workout_id]
      properties:
        type:
          type: string
          enum: [heaviest_set, best_1rm, best_volume, best_reps]
        exercise_id:
          type: string
          format: uuid
        exercise_name:
          type: string
        value:
          type: number
        date:
          type: string
          format: date-time
        workout_id:
          type: string
          format: uuid
        set_id:
          type: string
          format: uuid
          nullable: true
    WorkoutStats:
      type: object
      required: [total_workouts, total_duration, total_volume, total_sets, avg_workout_duration, workout_types]
      properties:
        total_workouts:
          type: integer
        total_duration:
          type: integer
        total_volume:
          type: number
        total_sets:
          type: integer
        avg_workout_duration:
          type: number
        workout_types:
          type: object
          additionalProperties:
            type: integer
    StreaksResponse:
      type: object
      required: [streaks, adherence_summary]
      properties:
        streaks:
          $ref: "#/components/schemas/Streaks"
        adherence_summary:
          $ref: "#/components/schemas/AdherenceSummary"
    Streaks:
      type: object
      required: [workout_streak, meal_streak, weigh_in_streak]
      properties:
        workout_streak:
          type: integer
        meal_streak:
          type: integer
        weigh_in_streak:
          type: integer
    AdherenceSummary:
      type: object
      required: [days_7, days_30, days_90]
      properties:
        days_7:
          type: number
        days_30:
          type: number
        days_90:
          type: number
    ExerciseHistoryEntry:
      type: object
      required: [date, workout_id, workout_type, sets, volume, estimated_1rm]
      properties:
        date:
          type: string
          format: date-time
        workout_id:
          type: string
          format: uuid
        workout_type:
          type: string
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSetData"
        volume:
          type: number
        estimated_1rm:
          type: number
    WorkoutSetData:
      type: object
      required: [weight, reps, rpe, completed]
      properties:
        weight:
          type: number
        reps:
          type: integer
        rpe:
          type: number
        completed:
          type: boolean
    User:
      type: object
      required:
        - id
        - email
        - name
        - avatar
        - age
        - weight
        - height
        - goal
        - activity_level
        - tdee
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
        age:
          type: integer
        date_of_birth:
          type: string
          format: date-time
          nullable: true
        weight:
          type: number
          format: double
        height:
          type: number
          format: double
        goal:
          type: string
        activity_level:
          type: string
        tdee:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserSummary:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
    Exercise:
      type: object
      required:
        - id
        - name
        - muscle_group
        - equipment
        - difficulty
        - instructions
        - video_url
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle_group:
          type: string
        equipment:
          type: string
        difficulty:
          type: string
        instructions:
          type: string
        video_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExerciseSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    WorkoutSet:
      type: object
      required:
        - id
        - workout_exercise_id
        - set_number
        - reps
        - weight
        - rpe
        - rest_seconds
        - completed
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workout_exercise_id:
          type: string
          format: uuid
        set_number:
          type: integer
        reps:
          type: integer
        weight:
          type: number
          format: double
        rpe:
          type: number
          format: double
        rest_seconds:
          type: integer
        completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkoutExercise:
      type: object
      required:
        - id
        - workout_id
        - exercise_id
        - order
        - sets
        - reps
        - weight
        - rest_time
        - notes
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workout_id:
          type: string
          format: uuid
        exercise_id:
          type: string
          format: uuid
        order:
          type: integer
        sets:
          type: integer
        reps:
          type: integer
        weight:
          type: number
          format: double
        rest_time:
          type: integer
        notes:
          type: string
        exercise:
