          type: string
          format: uuid
        order:
          type: integer
          minimum: 1
        sets:
          type: integer
          minimum: 0
        reps:
          type: integer
          minimum: 0
        weight:
          type: number
          format: double
          minimum: 0
        rest_time:
          type: integer
          minimum: 0
