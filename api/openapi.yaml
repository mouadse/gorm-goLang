          minimum: 1
        reps:
          type: integer
          minimum: 0
        weight:
          type: number
          format: double
          minimum: 0
        rpe:
          type: number
          format: double
          minimum: 0
        rest_seconds:
          type: integer
          minimum: 0
        completed:
          type: boolean
    CreateWorkoutExerciseRequest:
