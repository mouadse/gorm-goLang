          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        meal_type:
          type: string
        date:
          type: string
          format: date-time
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WeightEntry:
