        date_of_birth:
          type: string
          format: date
        weight:
          type: number
          format: double
          minimum: 0
        height:
          type: number
          format: double
          minimum: 0
        goal:
          type: string
        activity_level:
          type: string
        tdee:
          type: integer
          minimum: 0
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
        age:
          type: integer
          minimum: 0
        date_of_birth:
          type: string
          format: date
          nullable: true
        weight:
          type: number
          format: double
          minimum: 0
        height:
          type: number
          format: double
          minimum: 0
        goal:
          type: string
        activity_level:
          type: string
        tdee:
          type: integer
          minimum: 0
    CreateExerciseRequest:
      type: object
