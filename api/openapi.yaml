              schema:
                $ref: "#/components/schemas/ExportJob"
  /v1/exports/{id}:
    get:
      tags: [Exports]
      summary: Get export job status or download data
      operationId: getExportJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: download
          in: query
          schema:
            type: boolean
          description: If true, downloads the exported data instead of returning the status.
      responses:
        "200":
          description: The export job status (without download) or the exported file data (with download=true).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ExportJob"
                  - $ref: "#/components/schemas/UserDataExport"
              examples:
                jobStatus:
                  summary: Export job status (when download is false or omitted)
                  value:
                    id: "123e4567-e89b-12d3-a456-426614174000"
                    user_id: "123e4567-e89b-12d3-a456-426614174001"
                    format: json
                    status: completed
                    created_at: "2024-01-15T10:30:00Z"
                downloadedData:
                  summary: Exported user data (when download=true and format=json)
                  value:
                    export_id: "123e4567-e89b-12d3-a456-426614174002"
                    user_id: "123e4567-e89b-12d3-a456-426614174001"
                    exported_at: "2024-01-15T10:35:00Z"
                    format: json
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Export job not completed yet (when download=true).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
