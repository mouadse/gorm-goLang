        workout_sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSet"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Workout:
      type: object
      required:
        - id
        - user_id
        - date
        - duration
        - notes
        - type
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        duration:
          type: integer
        notes:
          type: string
        type:
          type: string
        user:
          $ref: "#/components/schemas/UserSummary"
        workout_exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExercise"
        created_at:
