        notes:
          type: string
    UpdateWeightEntryRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        weight:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
        date:
          type: string
          format: date
        notes:
          type: string
    CreateMealRequest:
      type: object
      required: [user_id, meal_type]
      properties:
        user_id:
          type: string
          format: uuid
        meal_type:
          type: string
        date:
          type: string
          format: date
          description: Optional. Defaults to the current UTC day.
        notes:
          type: string
    UpdateMealRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        meal_type:
          type: string
        date:
          type: string
          format: date
        notes:
          type: string
