          format: uuid
        order:
          type: integer
          minimum: 1
          description: Optional. The API auto-assigns the next order when omitted or zero.
        sets:
          type: integer
          minimum: 0
        reps:
          type: integer
          minimum: 0
        weight:
          type: number
          format: double
          minimum: 0
        rest_time:
          type: integer
          minimum: 0
        notes:
          type: string
        set_entries:
          type: array
          items:
            $ref: "#/components/schemas/CreateWorkoutSetRequest"
    UpdateWorkoutExerciseRequest:
      type: object
      properties:
