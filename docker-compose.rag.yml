x-rag-image: &rag_image
  image: fitness-rag:dev

x-rag-build: &rag_build
  context: ./rag_setup/app
  dockerfile: Dockerfile
  args:
    TORCH_BACKEND: ${TORCH_BACKEND:-cpu}

x-rag-env: &rag_env
  QDRANT_URL: http://rag-qdrant:6333
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-books}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3-flash-preview}
  OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-512}
  RAG_QUERY_MODE: ${RAG_QUERY_MODE:-default}
  RAG_SIMILARITY_TOP_K: ${RAG_SIMILARITY_TOP_K:-8}
  RAG_SPARSE_TOP_K: ${RAG_SPARSE_TOP_K:-8}
  RAG_SIMILARITY_CUTOFF: ${RAG_SIMILARITY_CUTOFF:-0.0}
  RAG_SEARCH_HNSW_EF: ${RAG_SEARCH_HNSW_EF:-128}
  RAG_EXACT_SEARCH: ${RAG_EXACT_SEARCH:-0}
  RAG_INDEXED_ONLY: ${RAG_INDEXED_ONLY:-0}
  RAG_HYBRID_FUSION: ${RAG_HYBRID_FUSION:-rrf}
  RAG_HYBRID_ALPHA: ${RAG_HYBRID_ALPHA:-0.5}
  RAG_HYBRID_RRF_K: ${RAG_HYBRID_RRF_K:-60}
  RAG_QUANTIZATION_RESCORE: ${RAG_QUANTIZATION_RESCORE:-1}
  RAG_QUANTIZATION_IGNORE: ${RAG_QUANTIZATION_IGNORE:-0}
  RAG_QUANTIZATION_OVERSAMPLING: ${RAG_QUANTIZATION_OVERSAMPLING:-3.0}
  RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
  RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-64}
  RAG_EMBED_DIMENSION: ${RAG_EMBED_DIMENSION:-1536}
  RAG_STATE_DIR: /app/state
  QDRANT_TIMEOUT_SECONDS: ${QDRANT_TIMEOUT_SECONDS:-10}
  QDRANT_SHARD_NUMBER: ${QDRANT_SHARD_NUMBER:-1}
  QDRANT_REPLICATION_FACTOR: ${QDRANT_REPLICATION_FACTOR:-1}
  QDRANT_WRITE_CONSISTENCY_FACTOR: ${QDRANT_WRITE_CONSISTENCY_FACTOR:-1}
  QDRANT_ON_DISK_PAYLOAD: ${QDRANT_ON_DISK_PAYLOAD:-1}
  QDRANT_DENSE_ON_DISK: ${QDRANT_DENSE_ON_DISK:-0}
  QDRANT_SPARSE_ON_DISK: ${QDRANT_SPARSE_ON_DISK:-0}
  QDRANT_HNSW_M: ${QDRANT_HNSW_M:-32}
  QDRANT_HNSW_EF_CONSTRUCT: ${QDRANT_HNSW_EF_CONSTRUCT:-200}
  QDRANT_FULL_SCAN_THRESHOLD: ${QDRANT_FULL_SCAN_THRESHOLD:-10000}
  QDRANT_MAX_INDEXING_THREADS: ${QDRANT_MAX_INDEXING_THREADS:-2}
  QDRANT_DEFAULT_SEGMENT_NUMBER: ${QDRANT_DEFAULT_SEGMENT_NUMBER:-2}
  QDRANT_INDEXING_THRESHOLD: ${QDRANT_INDEXING_THRESHOLD:-10000}
  QDRANT_FLUSH_INTERVAL_SEC: ${QDRANT_FLUSH_INTERVAL_SEC:-5}
  QDRANT_PREVENT_UNOPTIMIZED: ${QDRANT_PREVENT_UNOPTIMIZED:-0}
  QDRANT_ENABLE_QUANTIZATION: ${QDRANT_ENABLE_QUANTIZATION:-1}
  QDRANT_QUANTIZATION_ALWAYS_RAM: ${QDRANT_QUANTIZATION_ALWAYS_RAM:-1}
  RAG_CPU_THREADS: ${RAG_CPU_THREADS:-2}
  OMP_NUM_THREADS: ${RAG_CPU_THREADS:-2}
  OPENBLAS_NUM_THREADS: ${RAG_CPU_THREADS:-2}
  MKL_NUM_THREADS: ${RAG_CPU_THREADS:-2}
  NUMEXPR_NUM_THREADS: ${RAG_CPU_THREADS:-2}
  VECLIB_MAXIMUM_THREADS: ${RAG_CPU_THREADS:-2}
  RAYON_NUM_THREADS: ${RAG_CPU_THREADS:-2}
  TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}

services:
  rag-qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: fitness-rag-qdrant
    environment:
      QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER: ${QDRANT_DEFAULT_SEGMENT_NUMBER:-2}
      QDRANT__STORAGE__OPTIMIZERS__MAX_OPTIMIZATION_THREADS: ${QDRANT_MAX_OPTIMIZATION_THREADS:-1}
      QDRANT__STORAGE__HNSW_INDEX__M: ${QDRANT_HNSW_M:-32}
      QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT: ${QDRANT_HNSW_EF_CONSTRUCT:-200}
      QDRANT__STORAGE__HNSW_INDEX__MAX_INDEXING_THREADS: ${QDRANT_MAX_INDEXING_THREADS:-2}
      QDRANT__STORAGE__PERFORMANCE__ASYNC_SCORER: ${QDRANT_ASYNC_SCORER:-true}
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: ${QDRANT_MAX_SEARCH_THREADS:-2}
      QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET: ${QDRANT_OPTIMIZER_CPU_BUDGET:-1}
    volumes:
      - rag_qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${RAG_QDRANT_PORT:-6334}:6333"
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    cpus: "${RAG_QDRANT_CPUS:-2.0}"
    networks:
      - fitness-network

  rag-api:
    <<: *rag_image
    build: *rag_build
    container_name: fitness-rag-api
    ports:
      - "127.0.0.1:${RAG_API_PORT:-8088}:8000"
    environment: *rag_env
    volumes:
      - ./rag_setup/books:/books
      - ./rag_setup/runtime_overrides/shared.py:/app/shared.py:ro
      - rag_state:/app/state
    depends_on:
      rag-qdrant:
        condition: service_healthy
      rag-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    init: true
    cpus: "${RAG_API_CPUS:-1.5}"
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      fitness-network:
        aliases:
          - api

  rag-bootstrap:
    <<: *rag_image
    build: *rag_build
    container_name: fitness-rag-bootstrap
    environment:
      <<: *rag_env
      RAG_EMBED_BATCH_SIZE: ${RAG_EMBED_BATCH_SIZE:-64}
    volumes:
      - ./rag_setup/books:/books
      - ./rag_setup/runtime_overrides/shared.py:/app/shared.py:ro
      - rag_state:/app/state
    depends_on:
      rag-qdrant:
        condition: service_healthy
    restart: "no"
    init: true
    cpus: "${RAG_INGEST_CPUS:-2.0}"
    command: ["python", "ingest.py"]
    networks:
      - fitness-network

  rag-ingest:
    <<: *rag_image
    build: *rag_build
    container_name: fitness-rag-ingest
    environment:
      <<: *rag_env
      RAG_EMBED_BATCH_SIZE: ${RAG_EMBED_BATCH_SIZE:-64}
    volumes:
      - ./rag_setup/books:/books
      - ./rag_setup/runtime_overrides/shared.py:/app/shared.py:ro
      - rag_state:/app/state
    depends_on:
      rag-qdrant:
        condition: service_healthy
    profiles:
      - tools
    cpus: "${RAG_INGEST_CPUS:-2.0}"
    networks:
      - fitness-network

  rag-ui:
    build:
      context: ./rag_setup/ui
      dockerfile: Dockerfile
    container_name: fitness-rag-ui
    environment:
      API_URL: http://rag-api:8000/query
    volumes:
      - ./rag_setup/ui/ui.py:/ui/ui.py
    ports:
      - "127.0.0.1:${RAG_UI_PORT:-8502}:8502"
    depends_on:
      rag-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8502', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    init: true
    cpus: "${RAG_UI_CPUS:-0.5}"
    command: ["streamlit", "run", "ui.py", "--server.address=0.0.0.0", "--server.port=8502"]
    networks:
      - fitness-network

volumes:
  rag_qdrant_data:
  rag_state:

networks:
  fitness-network:
    driver: bridge
