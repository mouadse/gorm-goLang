x-backend-image: &backend_image
  image: fitness-backend:dev

x-backend-build: &backend_build
  context: .
  dockerfile: Dockerfile

services:
  migrate:
    <<: *backend_image
    container_name: fitness-migrate
    command: ["migrate"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/fitness_tracker?sslmode=disable
      - APP_ENV=${APP_ENV:-development}
      - GORM_LOG_LEVEL=${GORM_LOG_LEVEL:-warn}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - fitness-network

  # Seed - populate initial data after migrations
  seed:
    <<: *backend_image
    container_name: fitness-seed
    entrypoint: ["/app/fitness-tracker-seed"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/fitness_tracker?sslmode=disable
      - EXERCISE_LIB_URL=http://exercise-lib:8000
      - APP_ENV=${APP_ENV:-development}
      - SEED_MODE=${SEED_MODE:-if-empty}
    depends_on:
      migrate:
        condition: service_completed_successfully
      exercise-lib:
        condition: service_healthy
    restart: "no"
    networks:
      - fitness-network

  # Application
  app:
    <<: *backend_image
    build: *backend_build
    container_name: fitness-app
    command: ["api"]
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/fitness_tracker?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.0-flash-001}
      - APP_ENV=${APP_ENV:-development}
      - GORM_LOG_LEVEL=${GORM_LOG_LEVEL:-warn}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS:-}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-}
      - CORS_MAX_AGE_SECONDS=${CORS_MAX_AGE_SECONDS:-}
      - EXERCISE_LIB_URL=http://exercise-lib:8000
      - RAG_API_URL=http://rag-api:8000
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-25}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-5}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-30m}
      - DB_CONN_MAX_IDLE_TIME=${DB_CONN_MAX_IDLE_TIME:-5m}
      - TLS_SELF_SIGNED_HOSTS=${TLS_SELF_SIGNED_HOSTS:-localhost,127.0.0.1,app,fitness-app}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      exercise-lib:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "-O", "/dev/null", "https://localhost:8080/readyz"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks:
      - fitness-network

  worker:
    <<: *backend_image
    container_name: fitness-worker
    command: ["worker"]
    ports:
      - "${WORKER_METRICS_HOST_PORT:-9091}:9091"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/fitness_tracker?sslmode=disable
      - APP_ENV=${APP_ENV:-development}
      - GORM_LOG_LEVEL=${GORM_LOG_LEVEL:-warn}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-10}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-5}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-30m}
      - DB_CONN_MAX_IDLE_TIME=${DB_CONN_MAX_IDLE_TIME:-5m}
      - WORKER_EXPORT_POLL_INTERVAL=${WORKER_EXPORT_POLL_INTERVAL:-15s}
      - WORKER_ADMIN_REFRESH_INTERVAL=${WORKER_ADMIN_REFRESH_INTERVAL:-1h}
      - WORKER_NOTIFICATION_POLL_INTERVAL=${WORKER_NOTIFICATION_POLL_INTERVAL:-1h}
      - WORKER_METRICS_PORT=${WORKER_METRICS_PORT:-9091}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - fitness-network

  # Exercise Library Service
  exercise-lib:
    build:
      context: ./exercises_lib_service
      dockerfile: Dockerfile
    container_name: fitness-exercise-lib
    env_file:
      - ./exercises_lib_service/.env
    ports:
      - "${EXERCISE_LIB_HOST_PORT:-8000}:8000"
    cpus: "${APP_CPUS:-2.0}"
    environment:
      - PORT=8000
      - EXERCISE_DATA_DIR=/app/exercise_data
      - CATALOG_CACHE_DIR=/app/.catalog_cache
      - EMBEDDING_CACHE_DIR=/var/cache/fastembed
      - EMBEDDING_THREADS=${EMBEDDING_THREADS:-8}
      - EMBEDDING_PARALLEL=${EMBEDDING_PARALLEL:-4}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-64}
    volumes:
      - ./exercises_lib_service/exercise_data:/app/exercise_data:ro
      - ./exercises_lib_service/.catalog_cache:/app/.catalog_cache
      - fastembed_cache:/var/cache/fastembed
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000/readyz"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s
    restart: unless-stopped
    networks:
      - fitness-network

  # Database
  postgres:
    image: postgres:16-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness_tracker
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitness_tracker"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - fitness-network

  # Database Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fitness-pgadmin
    ports:
      - "${PGADMIN_HOST_PORT:-8081}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fitness-tracker.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitness-network

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fitness-prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitness-network

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:11.3.0
    container_name: fitness-grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitness-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  fastembed_cache:

networks:
  fitness-network:
    driver: bridge
