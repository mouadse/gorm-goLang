name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret
      APP_ENV: test
      GORM_LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go test suite
        run: go test ./...
