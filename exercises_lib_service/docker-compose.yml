services:
  workout-recommender:
    build:
      context: .
      target: runtime
    cpus: "${APP_CPUS:-2.0}"
    ports:
      - "${EXERCISE_LIB_HOST_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - EXERCISE_DATA_DIR=/app/exercise_data
      - CATALOG_CACHE_DIR=/app/.catalog_cache
      - EMBEDDING_CACHE_DIR=/var/cache/fastembed
      - EMBEDDING_THREADS=${EMBEDDING_THREADS:-8}
      - EMBEDDING_PARALLEL=${EMBEDDING_PARALLEL:-4}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-64}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-4}
      - NUMEXPR_NUM_THREADS=${NUMEXPR_NUM_THREADS:-4}
    volumes:
      - ./exercise_data:/app/exercise_data:ro
      - ./.catalog_cache:/app/.catalog_cache
      - fastembed_cache:/var/cache/fastembed

volumes:
  fastembed_cache:
